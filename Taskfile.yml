version: '3'

tasks:
  install:
    desc: Install dependencies
    cmds:
      - pnpm install

  lint:
    desc: Run ESLint
    cmds:
      - pnpm lint

  format:
    desc: Check formatting with Prettier
    cmds:
      - pnpm format:check

  typecheck:
    desc: Run TypeScript type checking
    cmds:
      - pnpm typecheck

  test:
    desc: Run tests
    cmds:
      - pnpm test

  build:
    desc: Build the project
    cmds:
      - pnpm build

  verify:
    desc: Run all quality gates
    cmds:
      - task: lint
      - task: format
      - task: typecheck
      - task: test
      - task: build
