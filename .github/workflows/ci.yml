---
name: CI

'on':
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality:
    if: github.repository_owner == 'oaslananka' || github.repository_owner == 'oaslananka-ops'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['24']

    steps:
      # actions/checkout v6.0.3
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      # pnpm/action-setup v6.0.8
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093
      # actions/setup-node v6.4.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level low
      - run: pnpm peers check
      - run: pnpm format:check
      - run: pnpm typecheck
      - run: pnpm typecheck:extension
      - run: pnpm lint
      - run: pnpm lint:tools
      - run: pnpm verify:tool-coverage
      - run: pnpm test
      - run: pnpm test:coverage
      - run: pnpm build
      - run: pnpm check:metadata
      - run: pnpm build:extension
      - run: pnpm verify:extension
      - name: Pack PR test package
        if: github.event_name == 'pull_request'
        run: |
          mkdir -p artifacts
          npm pack --pack-destination artifacts
      - name: Upload PR test artifact
        if: github.event_name == 'pull_request'
        # actions/upload-artifact v4
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: easyeda-mcp-pro-pr-${{ github.event.pull_request.number }}
          path: |
            artifacts/*.tgz
            easyeda-bridge-extension.eext
            easyeda-bridge-extension/easyeda-bridge-extension.checksums.json
            easyeda-bridge-extension/dist/index.js
          if-no-files-found: error
      - run: pnpm generate:tools-doc
      - run: git diff --exit-code docs/reference/tools.md
      - run: pnpm docs:build
      - name: Docker default startup smoke
        run: |
          docker build -t easyeda-mcp-pro:ci .
          cid=$(docker run -d easyeda-mcp-pro:ci)
          trap 'docker rm -f "$cid" >/dev/null 2>&1 || true' EXIT
          sleep 3
          docker logs "$cid"
          docker exec "$cid" node -e "const r = await fetch('http://127.0.0.1:3000/healthz'); if (!r.ok) process.exit(1); console.log(await r.text());"

  test-matrix:
    # Lean build + unit-test coverage across the supported Node range and
    # across platforms. The heavy `quality` job (docker smoke, docs, coverage)
    # stays on ubuntu + Node 24; this job adds Node 26 and Windows/macOS so
    # path-separator and file-handling regressions in the CLI/extension
    # packaging get caught without duplicating the whole quality pipeline.
    if: github.repository_owner == 'oaslananka' || github.repository_owner == 'oaslananka-ops'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node-version: '26'
          - os: windows-latest
            node-version: '24'
          - os: macos-latest
            node-version: '24'
    runs-on: ${{ matrix.os }}

    steps:
      # actions/checkout v6.0.3
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      # pnpm/action-setup v6.0.8
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093
      # actions/setup-node v6.4.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm typecheck:extension
      - run: pnpm test
      - run: pnpm build
      - run: pnpm build:extension
      - name: Doctor (CLI startup smoke)
        run: node dist/index.js --doctor

  codeql:
    if: (github.repository_owner == 'oaslananka' || github.repository_owner == 'oaslananka-ops') && (github.event_name == 'push' || github.event_name == 'pull_request')
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read

    steps:
      # actions/checkout v6.0.3
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      # pnpm/action-setup v6.0.8
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093
      # actions/setup-node v6.4.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '24'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Initialize CodeQL
        # github/codeql-action/init v4.36.2
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e
        with:
          languages: javascript-typescript

      - name: Perform CodeQL Analysis
        # github/codeql-action/analyze v4.36.2
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e
