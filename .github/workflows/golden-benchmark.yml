---
name: Golden Benchmark

'on':
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  benchmark:
    if: github.repository_owner == 'oaslananka' || github.repository_owner == 'oaslananka-ops'
    runs-on: ubuntu-latest

    steps:
      # actions/checkout v6.0.3
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      # pnpm/action-setup v6.0.8
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093
      # actions/setup-node v6.4.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '24'
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - name: Run golden eval benchmark (non-live, mocked-fixture tier)
        run: pnpm exec tsx scripts/run-evals.mts --output .easyeda-mcp-pro/evals/ci-latest.json

      - name: Upload benchmark report
        if: always()
        # actions/upload-artifact v7.0.1
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: golden-benchmark-report
          path: .easyeda-mcp-pro/evals/ci-latest.json
          retention-days: 30
